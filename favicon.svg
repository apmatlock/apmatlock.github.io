<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Navy background -->
  <rect width="16" height="16" fill="#000080"/>

  <!-- Cranium -->
  <rect x="4" y="0" width="8"  height="1" fill="#c0c0c0"/>
  <rect x="2" y="1" width="12" height="1" fill="#c0c0c0"/>
  <rect x="1" y="2" width="14" height="2" fill="#c0c0c0"/>

  <!-- Eye socket tops/bottoms (rows 4 and 7): holes at x=3-5 and x=10-12 -->
  <rect x="1"  y="4" width="2" height="1" fill="#c0c0c0"/>
  <rect x="6"  y="4" width="4" height="1" fill="#c0c0c0"/>
  <rect x="13" y="4" width="2" height="1" fill="#c0c0c0"/>

  <!-- Eye sockets wide (rows 5-6): holes at x=2-6 and x=9-13 -->
  <rect x="1"  y="5" width="1" height="2" fill="#c0c0c0"/>
  <rect x="7"  y="5" width="2" height="2" fill="#c0c0c0"/>
  <rect x="14" y="5" width="1" height="2" fill="#c0c0c0"/>

  <rect x="1"  y="7" width="2" height="1" fill="#c0c0c0"/>
  <rect x="6"  y="7" width="4" height="1" fill="#c0c0c0"/>
  <rect x="13" y="7" width="2" height="1" fill="#c0c0c0"/>

  <!-- Cheekbones with nose cavity (x=6-9 open) -->
  <rect x="2"  y="8" width="4" height="1" fill="#c0c0c0"/>
  <rect x="10" y="8" width="4" height="1" fill="#c0c0c0"/>
  <rect x="3"  y="9" width="3" height="1" fill="#c0c0c0"/>
  <rect x="10" y="9" width="3" height="1" fill="#c0c0c0"/>

  <!-- Jaw -->
  <rect x="2" y="10" width="12" height="1" fill="#c0c0c0"/>

  <!-- Teeth (6 teeth, 2px tall, gaps between) -->
  <rect x="2"  y="11" width="1" height="2" fill="#c0c0c0"/>
  <rect x="4"  y="11" width="1" height="2" fill="#c0c0c0"/>
  <rect x="6"  y="11" width="1" height="2" fill="#c0c0c0"/>
  <rect x="8"  y="11" width="1" height="2" fill="#c0c0c0"/>
  <rect x="10" y="11" width="1" height="2" fill="#c0c0c0"/>
  <rect x="12" y="11" width="1" height="2" fill="#c0c0c0"/>
</svg>
